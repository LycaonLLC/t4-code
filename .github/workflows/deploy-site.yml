name: Deploy project site
run-name: Deploy project site ${{ inputs.release_tag || github.ref_name }} ${{ inputs.dispatch_nonce || github.sha }}

on:
  push:
    branches: [main, master]
    paths:
      - "apps/site/**"
      - "packages/**"
      - "cluster/images/site/**"
      - "deploy/charts/t4-site/**"
      - "scripts/deploy-site.mjs"
      - "scripts/generate-release-manifest.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-site.yml"
      - ".woodpecker.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published release tag whose immutable source must be deployed.
        required: true
        type: string
      dispatch_nonce:
        description: Unique release-workflow dispatch identity.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: t4code-com-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: production
      url: https://t4code.com
    steps:
      - name: Check out trusted workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve immutable deployment source
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          TRUSTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          source_sha="$TRUSTED_SHA"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version=$(node -p "require('./package.json').version")
            expected_tag="v${version}"
            if [[ "$REQUESTED_RELEASE_TAG" != "$expected_tag" || "$GITHUB_REF" != "refs/tags/${expected_tag}" ]]; then
              echo "release deployment must run from the current immutable tag ${expected_tag}" >&2
              exit 1
            fi
            release_flags=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${expected_tag}" --jq '[.draft, .prerelease] | @tsv')
            if [[ "$release_flags" != $'false\tfalse' ]]; then
              echo "release_tag must name a published, non-prerelease GitHub release" >&2
              exit 1
            fi
            git fetch --force origin "refs/tags/${expected_tag}:refs/tags/${expected_tag}"
            source_sha=$(git rev-parse "${expected_tag}^{commit}")
            if [[ "$source_sha" != "$TRUSTED_SHA" ]]; then
              echo "release tag moved after this deployment was dispatched" >&2
              exit 1
            fi
          fi
          printf 'source_sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"

      - name: Check out immutable deployment source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.source.outputs.source_sha }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.10.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate the site build
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          node scripts/generate-release-manifest.mjs \
            --version "$version" \
            --output apps/site/public/releases/latest.json
          pnpm build:site

      - name: Install pinned Helm
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/helm.tar.gz https://get.helm.sh/helm-v3.19.0-linux-amd64.tar.gz
          echo "a7f81ce08007091b86d8bd696eb4d86b8d0f2e1b9f6c714be62f82f96a594496  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm

      - name: Configure production cluster access
        shell: bash
        env:
          T4_KUBECONFIG_BASE64: ${{ secrets.T4_KUBECONFIG_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$T4_KUBECONFIG_BASE64"
          install -d -m 0700 "$RUNNER_TEMP/kube"
          printf '%s' "$T4_KUBECONFIG_BASE64" | base64 --decode > "$RUNNER_TEMP/kube/config"
          chmod 0600 "$RUNNER_TEMP/kube/config"

      - name: Deploy exact commit image and verify production
        env:
          KUBECONFIG: ${{ runner.temp }}/kube/config
          T4_SITE_IMAGE_TAG: ${{ steps.source.outputs.source_sha }}
        run: pnpm deploy:site
