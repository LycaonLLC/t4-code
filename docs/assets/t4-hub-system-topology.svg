<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description" viewBox="0 0 1280 760">
  <title id="title">T4 Hub system topology</title>
  <desc id="description">Desktop and mobile T4 Code clients connect through Tailscale to the T4 Hub control plane. The Hub persists state in PostgreSQL, coordinates durable events and CI/CD, and uses the T4 Operator to manage OMP session runtimes in a k3s cluster. Runtime pods share CephFS, while MinIO stores durable objects and Grafana provides observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .group { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .group-title { font-size: 24px; font-weight: 700; }
      .group-subtitle { font-size: 15px; fill: #64748b; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 12; }
      .client { fill: #eef2ff; stroke: #6366f1; }
      .network { fill: #ecfeff; stroke: #0891b2; }
      .control { fill: #eff6ff; stroke: #2563eb; }
      .runtime { fill: #f0fdf4; stroke: #16a34a; }
      .storage { fill: #fff7ed; stroke: #ea580c; }
      .telemetry { fill: #faf5ff; stroke: #9333ea; }
      .node-title { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .node-subtitle { font-size: 13px; fill: #64748b; text-anchor: middle; }
      .edge { fill: none; stroke: #475569; stroke-width: 2.25; marker-end: url(#arrow); }
      .edge-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .edge-label { font-size: 13px; fill: #475569; text-anchor: middle; paint-order: stroke; stroke: #ffffff; stroke-width: 5px; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff" />

  <rect class="group" x="420" y="35" width="360" height="680" />
  <text class="group-title" x="450" y="75">T4 Hub</text>
  <text class="group-subtitle" x="450" y="100">HA control plane</text>

  <rect class="group" x="825" y="35" width="425" height="680" />
  <text class="group-title" x="855" y="75">k3s execution cluster</text>
  <text class="group-subtitle" x="855" y="100">T4 Nodes, session runtimes, and shared services</text>

  <rect class="node client" x="30" y="190" width="185" height="78" />
  <text class="node-title" x="122.5" y="222">T4 Code</text>
  <text class="node-subtitle" x="122.5" y="246">mobile client</text>

  <rect class="node client" x="30" y="310" width="185" height="78" />
  <text class="node-title" x="122.5" y="342">T4 Code</text>
  <text class="node-subtitle" x="122.5" y="366">desktop client</text>

  <rect class="node network" x="245" y="250" width="145" height="78" />
  <text class="node-title" x="317.5" y="282">Tailscale</text>
  <text class="node-subtitle" x="317.5" y="306">private ingress</text>

  <rect class="node control" x="470" y="135" width="260" height="82" />
  <text class="node-title" x="600" y="168">T4 API replicas</text>
  <text class="node-subtitle" x="600" y="193">Hub Wire and authentication</text>

  <rect class="node control" x="470" y="270" width="125" height="82" />
  <text class="node-title" x="532.5" y="302">PostgreSQL</text>
  <text class="node-subtitle" x="532.5" y="327">durable state</text>

  <rect class="node control" x="605" y="270" width="125" height="82" />
  <text class="node-title" x="667.5" y="302">Events</text>
  <text class="node-subtitle" x="667.5" y="327">commands + cursors</text>

  <rect class="node control" x="470" y="405" width="125" height="82" />
  <text class="node-title" x="532.5" y="437">T4 Operator</text>
  <text class="node-subtitle" x="532.5" y="462">reconciliation</text>

  <rect class="node control" x="605" y="405" width="125" height="82" />
  <text class="node-title" x="667.5" y="437">CI/CD</text>
  <text class="node-subtitle" x="667.5" y="462">GitHub integration</text>

  <rect class="node runtime" x="865" y="135" width="170" height="82" />
  <text class="node-title" x="950" y="168">OMP runtime A</text>
  <text class="node-subtitle" x="950" y="193">managed session pod</text>

  <rect class="node runtime" x="865" y="270" width="170" height="82" />
  <text class="node-title" x="950" y="303">OMP runtime B</text>
  <text class="node-subtitle" x="950" y="328">managed session pod</text>

  <rect class="node runtime" x="865" y="405" width="170" height="82" />
  <text class="node-title" x="950" y="438">OMP runtime C</text>
  <text class="node-subtitle" x="950" y="463">managed session pod</text>

  <rect class="node storage" x="1075" y="185" width="135" height="82" />
  <text class="node-title" x="1142.5" y="218">CephFS</text>
  <text class="node-subtitle" x="1142.5" y="243">shared projects</text>

  <rect class="node storage" x="1075" y="330" width="135" height="82" />
  <text class="node-title" x="1142.5" y="363">MinIO</text>
  <text class="node-subtitle" x="1142.5" y="388">durable objects</text>

  <rect class="node telemetry" x="1075" y="475" width="135" height="82" />
  <text class="node-title" x="1142.5" y="508">Grafana</text>
  <text class="node-subtitle" x="1142.5" y="533">LGTM stack</text>

  <path class="edge" d="M215 229 H245 V270" />
  <path class="edge" d="M215 349 H245 V308" />
  <path class="edge" d="M390 289 H430 V176 H470" />
  <text class="edge-label" x="430" y="271">Hub Wire</text>

  <path class="edge" d="M555 217 V270" />
  <path class="edge" d="M645 217 V270" />
  <path class="edge" d="M525 352 V405" />
  <path class="edge" d="M675 352 V405" />

  <path class="edge" d="M595 446 H810 V176 H865" />
  <path class="edge" d="M595 446 H810 V311 H865" />
  <path class="edge" d="M595 446 H810 V446 H865" />
  <text class="edge-label" x="788" y="431">desired state</text>

  <path class="edge-dashed" d="M730 311 H790 V176 H865" />
  <path class="edge-dashed" d="M730 311 H790 V311 H865" />
  <path class="edge-dashed" d="M730 311 H790 V446 H865" />
  <text class="edge-label" x="790" y="297">Runtime Wire</text>

  <path class="edge" d="M1035 176 H1055 V226 H1075" />
  <path class="edge" d="M1035 311 H1055 V226 H1075" />
  <path class="edge" d="M1035 446 H1055 V226 H1075" />

  <path class="edge-dashed" d="M730 330 H1045 V371 H1075" />
  <path class="edge-dashed" d="M1075 516 H1045 V391 H1075" />

  <text class="edge-label" x="1048" y="210">RWX</text>
  <text class="edge-label" x="990" y="357">artifacts</text>
</svg>
