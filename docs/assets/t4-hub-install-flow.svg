<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="install-title install-description" viewBox="0 0 1100 760">
  <title id="install-title">Guided T4 Hub installation flow</title>
  <desc id="install-description">The user installs T4 Code, chooses a local or remote Linux Hub, identifies the machine through Tailscale, runs the signed T4 Node installer, exchanges a one-time enrollment code, passes hardware and network preflight, installs the signed k3s release bundle, bootstraps platform services, runs an end-to-end health check, and pairs T4 Code.</desc>
  <defs>
    <marker id="install-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .box { fill: #fff; stroke: #64748b; stroke-width: 2.2; rx: 13; }
      .client { fill: #eef2ff; stroke: #6366f1; }
      .network { fill: #ecfeff; stroke: #0891b2; }
      .node { fill: #eff6ff; stroke: #2563eb; }
      .platform { fill: #f0fdf4; stroke: #16a34a; }
      .verify { fill: #fff7ed; stroke: #ea580c; }
      .title { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .subtitle { font-size: 13px; fill: #64748b; text-anchor: middle; }
      .step { font-size: 14px; font-weight: 700; fill: #475569; text-anchor: middle; }
      .edge { fill: none; stroke: #475569; stroke-width: 2.4; marker-end: url(#install-arrow); }
    </style>
  </defs>
  <rect width="1100" height="760" fill="#fff" />

  <rect class="box client" x="40" y="55" width="280" height="88" />
  <text class="step" x="68" y="82">1</text>
  <text class="title" x="180" y="103">Install T4 Code</text>
  <text class="subtitle" x="180" y="127">desktop setup experience</text>

  <rect class="box client" x="410" y="55" width="280" height="88" />
  <text class="step" x="438" y="82">2</text>
  <text class="title" x="550" y="103">Choose Hub profile</text>
  <text class="subtitle" x="550" y="127">local Linux or remote Linux</text>

  <rect class="box network" x="780" y="55" width="280" height="88" />
  <text class="step" x="808" y="82">3</text>
  <text class="title" x="920" y="103">Identify through Tailscale</text>
  <text class="subtitle" x="920" y="127">private machine discovery</text>

  <rect class="box node" x="780" y="255" width="280" height="88" />
  <text class="step" x="808" y="282">4</text>
  <text class="title" x="920" y="303">Run signed T4 Node</text>
  <text class="subtitle" x="920" y="327">bootstrap on Linux</text>

  <rect class="box network" x="410" y="255" width="280" height="88" />
  <text class="step" x="438" y="282">5</text>
  <text class="title" x="550" y="303">Exchange enrollment code</text>
  <text class="subtitle" x="550" y="327">short-lived and single-use</text>

  <rect class="box verify" x="40" y="255" width="280" height="88" />
  <text class="step" x="68" y="282">6</text>
  <text class="title" x="180" y="303">Run preflight</text>
  <text class="subtitle" x="180" y="327">CPU, memory, disk, OS, network, time</text>

  <rect class="box platform" x="40" y="455" width="280" height="88" />
  <text class="step" x="68" y="482">7</text>
  <text class="title" x="180" y="503">Install signed release</text>
  <text class="subtitle" x="180" y="527">k3s and pinned OCI bundle</text>

  <rect class="box platform" x="410" y="455" width="280" height="88" />
  <text class="step" x="438" y="482">8</text>
  <text class="title" x="550" y="503">Bootstrap services</text>
  <text class="subtitle" x="550" y="527">PostgreSQL, CephFS, MinIO, Grafana</text>

  <rect class="box verify" x="780" y="455" width="280" height="88" />
  <text class="step" x="808" y="482">9</text>
  <text class="title" x="920" y="503">End-to-end health check</text>
  <text class="subtitle" x="920" y="527">real session and recovery path</text>

  <rect class="box client" x="410" y="650" width="280" height="88" />
  <text class="step" x="438" y="677">10</text>
  <text class="title" x="550" y="698">Pair T4 Code</text>
  <text class="subtitle" x="550" y="722">Hub ready for client use</text>

  <path class="edge" d="M320 99 H410" />
  <path class="edge" d="M690 99 H780" />
  <path class="edge" d="M920 143 V255" />
  <path class="edge" d="M780 299 H690" />
  <path class="edge" d="M410 299 H320" />
  <path class="edge" d="M180 343 V455" />
  <path class="edge" d="M320 499 H410" />
  <path class="edge" d="M690 499 H780" />
  <path class="edge" d="M920 543 V600 H550 V650" />
</svg>
