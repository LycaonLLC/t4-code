<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="command-title command-description" viewBox="0 0 1080 700">
  <title id="command-title">Durable T4 command flow</title>
  <desc id="command-description">T4 Code submits a command ID. T4 Hub authenticates the request, PostgreSQL records it durably, the current session owner claims it using an owner epoch, the runtime invokes stock OMP, records the outcome, appends transcript and progress events, and advances the client cursor.</desc>
  <defs>
    <marker id="command-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .box { fill: #fff; stroke: #64748b; stroke-width: 2.25; rx: 13; }
      .client { fill: #eef2ff; stroke: #6366f1; }
      .hub { fill: #eff6ff; stroke: #2563eb; }
      .database { fill: #fdf4ff; stroke: #a21caf; }
      .runtime { fill: #f0fdf4; stroke: #16a34a; }
      .event { fill: #fff7ed; stroke: #ea580c; }
      .title { font-size: 20px; font-weight: 700; text-anchor: middle; }
      .subtitle { font-size: 14px; fill: #64748b; text-anchor: middle; }
      .step { font-size: 15px; font-weight: 700; fill: #475569; text-anchor: middle; }
      .edge { fill: none; stroke: #475569; stroke-width: 2.4; marker-end: url(#command-arrow); }
    </style>
  </defs>
  <rect width="1080" height="700" fill="#fff" />

  <rect class="box client" x="55" y="70" width="250" height="94" />
  <text class="step" x="82" y="97">1</text>
  <text class="title" x="180" y="119">T4 Code</text>
  <text class="subtitle" x="180" y="144">submit commandId</text>

  <rect class="box hub" x="415" y="70" width="250" height="94" />
  <text class="step" x="442" y="97">2</text>
  <text class="title" x="540" y="119">T4 Hub</text>
  <text class="subtitle" x="540" y="144">authenticate + validate</text>

  <rect class="box database" x="775" y="70" width="250" height="94" />
  <text class="step" x="802" y="97">3</text>
  <text class="title" x="900" y="119">PostgreSQL</text>
  <text class="subtitle" x="900" y="144">record command durably</text>

  <rect class="box runtime" x="775" y="300" width="250" height="94" />
  <text class="step" x="802" y="327">4</text>
  <text class="title" x="900" y="349">Session owner</text>
  <text class="subtitle" x="900" y="374">claim with ownerEpoch</text>

  <rect class="box runtime" x="415" y="300" width="250" height="94" />
  <text class="step" x="442" y="327">5</text>
  <text class="title" x="540" y="349">Stock OMP</text>
  <text class="subtitle" x="540" y="374">execute through RPC</text>

  <rect class="box event" x="55" y="300" width="250" height="94" />
  <text class="step" x="82" y="327">6</text>
  <text class="title" x="180" y="349">Durable outcome</text>
  <text class="subtitle" x="180" y="374">accepted, rejected, or failed</text>

  <rect class="box event" x="235" y="535" width="250" height="94" />
  <text class="step" x="262" y="562">7</text>
  <text class="title" x="360" y="584">Product events</text>
  <text class="subtitle" x="360" y="609">append transcript + progress</text>

  <rect class="box client" x="595" y="535" width="250" height="94" />
  <text class="step" x="622" y="562">8</text>
  <text class="title" x="720" y="584">T4 Code</text>
  <text class="subtitle" x="720" y="609">receive and advance cursor</text>

  <path class="edge" d="M305 117 H415" />
  <path class="edge" d="M665 117 H775" />
  <path class="edge" d="M900 164 V300" />
  <path class="edge" d="M775 347 H665" />
  <path class="edge" d="M415 347 H305" />
  <path class="edge" d="M180 394 V470 H360 V535" />
  <path class="edge" d="M485 582 H595" />
</svg>
